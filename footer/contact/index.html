<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/assets/img/logo.jpeg" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../assets/style.css">
    <title>Contact Us</title>
</head>

<body>
    <section class="py-5">
        <div class="container">
            <div class="row justify-content-center">

                <div class="col-lg-6">
                    <div class="card shadow-lg border-0 rounded-4">
                        <div class="card-body p-5">

                            <h2 class="text-center mb-4 fw-bold">Contact Us</h2>

                            <form action="https://formsubmit.co/vuupdates4@gmail.com" method="POST">

                                <input type="hidden" name="_captcha" value="false">
                                <input type="hidden" name="_subject" value="New Contact Message">
                                <input type="hidden" name="_template" value="table">

                                <div class="mb-3">
                                    <label for="formGroupExampleInput" class="form-label"></label>
                                    <input type="text" class="form-control" id="formGroupExampleInput"
                                    placeholder="Full Name" required>
                                </div>

                                <div class="form-floating mb-3">
                                    <input type="email" class="form-control" id="floatingInput"
                                        placeholder="name@example.com" required>
                                    <label for="floatingInput">Email address</label>
                                </div>


                                <div class=" mb-3 form-floating">
                                    <textarea class="form-control" placeholder="Leave a comment here"
                                        id="floatingTextarea" required></textarea>
                                    <label for="floatingTextarea">Comments</label>
                                </div>
                                <div class="g-recaptcha" data-sitekey="6Ld_wn8sAAAAAICMqe_iO5Pc_xv7N3QGiiLc6T7m"></div>
                                <div class="mt-3">
                                    <button type="submit" value="submit" class="btn btn-primary btn-md">
                                        Send Message
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6"></div>
            </div>
        </div>
    </section>
    <script src="../assets/script.js"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
